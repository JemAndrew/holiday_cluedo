<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission Briefing</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div id="mission-container">
    <h1>MISSION BRIEFING</h1>
    <div id="instructions">
      <p id="pass-instruction"></p>
      <button id="reveal-button">Confirm</button>
    </div>

    <div id="mission-details" style="display: none;">
      <h2>Your Target:</h2>
      <p><strong>Name:</strong> <span id="target-name"></span></p>
      <p><strong>With:</strong> <span id="target-weapon"></span></p>
      <p><strong>At:</strong> <span id="target-location"></span></p>
      <button id="mission-confirm-button">Confirm & Pass Phone</button>
    </div>
  </div>

  <script src="scripts/mission.js"></script>
</body>
</html>
